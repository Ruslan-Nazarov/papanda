<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit {{ model_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .edit-form { display: flex; flex-direction: column; gap: 10px; max-width: 500px; }
        .form-row { display: flex; flex-direction: column; }
        .form-row label { font-weight: bold; font-size: 12px; color: gray; }
        .form-row input { padding: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div class="container" style="padding: 10px;">
        <h3>Редактирование: {{ model_name }} (ID: {{ record.id }})</h3>
        <div class="button">
            <p><a href="{{ url_for('main.db_view', model_name=model_name) }}" class="button">← Отмена</a></p>
        </div>
    </div>
</div>

<div class="container">
    <div class="column_center" style="width: 100%; padding: 20px;">
        <form method="POST" class="edit-form">
            {% for col in columns %}
            <div class="form-row">
                <label>{{ col }}</label>
                {% if col == 'id' %}
                    <input type="text" name="{{ col }}" value="{{ record[col] }}" readonly style="background: #eee;">
                {% else %}
                    <input type="text" name="{{ col }}" value="{{ record[col] if record[col] is not none else '' }}">
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" style="margin-top: 10px; padding: 10px;">Сохранить</button>
        </form>
    </div>
</div>

</body>
</html>
