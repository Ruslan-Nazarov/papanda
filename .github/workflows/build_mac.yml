name: Build Papanda Mac

# ТРИГГЕРЫ
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    # ШАГ 1: Клонирование кода
    - name: Checkout Code
      uses: actions/checkout@v4

    # ШАГ 2: Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # ШАГ 3: Установка библиотек (ИСПРАВЛЕНО)
    # Мы ставим библиотеки вручную, чтобы гарантировать наличие Flask и отсутствие мусора.
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        
        # 1. Основные библиотеки приложения (как на Windows)
        pip install Flask Flask-SQLAlchemy SQLAlchemy openpyxl pywebview Pillow
        
        # 2. Специфичные библиотеки для macOS (нужны для pywebview)
        pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit
        
        # 3. Сборщик
        pip install pyinstaller

    # ШАГ 4: Сборка
    - name: Build with PyInstaller
      run: |
        # Используем тот же spec файл
        pyinstaller Papanda.spec

    # ШАГ 5: Архивация
    # macOS создает папку .app, которую нельзя просто так скачать.
    # Пакуем её в ZIP.
    - name: Zip Application
      run: |
        cd dist
        zip -r Papanda-Mac.zip Papanda.app

    # ШАГ 6: Загрузка результата
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Papanda-Mac-App
        path: dist/Papanda-Mac.zip
