name: Build Papanda EXE

# ТРИГГЕРЫ
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # ШАГ 1: Клонирование кода
    - name: Checkout Code
      uses: actions/checkout@v4

    # ШАГ 2: Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # ШАГ 3: Библиотеки (ИСПРАВЛЕНО)
    # Мы устанавливаем библиотеки вручную прямо здесь.
    # Это решает проблему "No module named 'flask'", потому что мы гарантированно ставим Flask.
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Ставим только то, что нужно для Papanda
        pip install Flask Flask-SQLAlchemy SQLAlchemy openpyxl pywebview Pillow
        # Ставим сборщик
        pip install pyinstaller

    # ШАГ 4: Сборка
    - name: Build with PyInstaller
      run: |
        # Используем ваш spec-файл (убедитесь, что он залит в репозиторий!)
        pyinstaller Papanda.spec

    # ШАГ 5: Сохранение результата
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Papanda-App
        # Имя файла должно совпадать с name='...' в Papanda.spec
        path: dist/Papanda.exe
