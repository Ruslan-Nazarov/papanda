name: Build Papanda EXE

# ТРИГГЕРЫ:
# - при пуше тега v* (например v0.6, v0.6.1) — собирает и создаёт GitHub Release
# - вручную через кнопку "Run workflow" на вкладке Actions
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ШАГ 1: Клонируем код
      - name: Checkout Code
        uses: actions/checkout@v4

      # ШАГ 2: Устанавливаем Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ШАГ 3: Устанавливаем зависимости из requirements.txt + PyInstaller
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ШАГ 3.5: Устанавливаем UPX (для максимального сжатия .exe)
      - name: Install UPX
        run: choco install upx

      # ШАГ 4: Собираем .exe через PyInstaller
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --noconsole `
            --hidden-import aiosqlite `
            --hidden-import jinja2 `
            --hidden-import email_validator `
            --hidden-import passlib.handlers.bcrypt `
            --hidden-import cryptography `
            --exclude-module tkinter `
            --exclude-module tcl `
            --exclude-module tk `
            --exclude-module unittest `
            --exclude-module pydoc `
            --exclude-module lib2to3 `
            --exclude-module tensorflow `
            --exclude-module pandas `
            --exclude-module numpy `
            --exclude-module scipy `
            --exclude-module torch `
            --exclude-module matplotlib `
            --exclude-module PIL `
            --exclude-module PyQt5 `
            --exclude-module PyQt6 `
            --add-data "fastapi_app/templates;fastapi_app/templates" `
            --add-data "fastapi_app/static;fastapi_app/static" `
            --name Papanda `
            run_fastapi.py

      # ШАГ 5: Загружаем .exe как артефакт сборки (доступен во вкладке Actions)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Papanda-Windows
          path: dist/Papanda.exe
          retention-days: 30

      # ШАГ 6: Создаём GitHub Release и прикрепляем .exe (только при пуше тега)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Papanda.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
