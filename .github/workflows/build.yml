name: Build Papanda EXE

# ТРИГГЕРЫ:
# 1. push: Сборка запускается при любом обновлении кода в ветке main.
# 2. workflow_dispatch: Добавляет кнопку для ручного запуска сборки.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # ШАГ 1: Клонирование вашего репозитория на сервер сборки
    - name: Checkout Code
      uses: actions/checkout@v4

    # ШАГ 2: Установка Python 3.12
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # ШАГ 3: Установка библиотек
    # Мы принудительно обновляем pip и ставим pyinstaller + pywebview
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pywebview Pillow

    # ШАГ 4: Сборка EXE
    # Используем ваш файл спецификации
    - name: Build with PyInstaller
      run: |
        pyinstaller papanda.spec

    # ШАГ 5: Сохранение результата (Артефакт)
    # Этот шаг берет созданный файл и делает его доступным для скачивания
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Papanda-App
        path: dist/papanda.exe
