<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}papanda{% endblock %}</title>

    <link rel="shortcut icon" href="{{ url_for('static', path='logo.ico') }}" />

    <!-- Centralized Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&family=Indie+Flower&display=swap"
        rel="stylesheet">

    <!-- Flatpickr for styled date inputs -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ru.js"></script>

    <style>
        /* Flatpickr Papanda overrides */
        .flatpickr-calendar {
            border-radius: 16px !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1) !important;
            border: 1px solid var(--color-border-light, #eee) !important;
            font-family: 'Inter', system-ui, sans-serif !important;
        }

        .flatpickr-day {
            border-radius: 8px !important;
        }

        .flatpickr-day.selected {
            background: #4F46E5 !important;
            border-color: #4F46E5 !important;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body style="margin: 0; background-color: var(--color-bg-app);">
    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}

    <!-- Auto-shutdown mechanism: keeps a WebSocket open to tell the server the app is active -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize custom styled date pickers
            setTimeout(() => {
                try {
                    flatpickr('input[type="date"]', {
                        dateFormat: "Y-m-d",
                        disableMobile: true,
                        locale: "ru",
                        altInput: true,
                        altFormat: "d.m.Y",
                        allowInput: true
                    });
                    flatpickr('input[type="datetime-local"]', {
                        enableTime: true,
                        dateFormat: "Y-m-d\\TH:i",
                        disableMobile: true,
                        locale: "ru",
                        altInput: true,
                        altFormat: "d.m.Y, H:i",
                        allowInput: true,
                        time_24hr: true
                    });
                } catch(e) { console.error("Flatpickr init error:", e); }
            }, 100);
        });

        (function () {
            let ws;
            function connect() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws/ping`;
                ws = new WebSocket(wsUrl);
                ws.onclose = () => {
                    // Try to reconnect if the socket drops but the window is still open
                    setTimeout(connect, 3000);
                };
            }
            // Connect after a short delay to prioritize page load
            setTimeout(connect, 1000);
        })();
    </script>
    
    <!-- I18n JavaScript Initialization -->
    <script>
        window.currentLocale = "{{ request.cookies.get('locale', 'en') }}";
        window.translations = {{ get_js_translations() | safe }};
        window._ = function(key, fallback) {
            let keys = key.split('.');
            let current = window.translations;
            for (let k of keys) {
                if (current && typeof current === 'object' && k in current) {
                    current = current[k];
                } else {
                    return fallback !== undefined ? fallback : key;
                }
            }
            return typeof current === 'string' ? current : (fallback !== undefined ? fallback : key);
        };
        
        async function switchLanguage(lang) {
            try {
                localStorage.removeItem('dialectics_last_note_id'); // Clear last note on language switch
                await fetch('/api/set-locale', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({locale: lang})
                });
                window.location.reload();
            } catch (e) {
                console.error("Failed to switch language", e);
            }
        }
    </script>
    
    {% if request.app.state.settings.demo_mode %}
    <div id="demo-disclaimer-banner" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 99999; width: 90%; max-width: 600px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; display: none; padding: 16px 20px; align-items: center; justify-content: space-between; gap: 16px;">
        <div style="flex: 1; font-size: 13px; line-height: 1.5; text-align: left;">
            <span style="font-weight: 700; color: #f97316; margin-right: 4px;">{{ _('demo_banner.title') }}</span>
            {{ _('demo_banner.description') }}
            <br><span style="color: #94a3b8; font-size: 12px; margin-top: 4px; display: inline-block;">{{ _('demo_banner.ai_note') }}</span>
        </div>
        <button onclick="dismissDemoDisclaimer()" style="background: #ea580c; border: none; border-radius: 6px; padding: 8px 16px; color: white; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.2s; white-space: nowrap;">
            {{ _('demo_banner.button') }}
        </button>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (!sessionStorage.getItem("demo_disclaimer_dismissed")) {
                const banner = document.getElementById("demo-disclaimer-banner");
                if (banner) {
                    banner.style.display = "flex";
                }
            }
        });
        function dismissDemoDisclaimer() {
            sessionStorage.setItem("demo_disclaimer_dismissed", "true");
            const banner = document.getElementById("demo-disclaimer-banner");
            if (banner) {
                banner.style.display = "none";
            }
        }
    </script>
    {% endif %}
</body>

</html>
