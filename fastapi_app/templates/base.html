<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Papanda{% endblock %}</title>

    <link rel="shortcut icon" href="{{ url_for('static', path='logo.ico') }}" />

    <!-- Centralized Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&family=Indie+Flower&display=swap"
        rel="stylesheet">

    <!-- Flatpickr for styled date inputs -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ru.js"></script>

    <style>
        /* Flatpickr Papanda overrides */
        .flatpickr-calendar {
            border-radius: 16px !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1) !important;
            border: 1px solid var(--color-border-light, #eee) !important;
            font-family: 'Inter', system-ui, sans-serif !important;
            padding: 10px;
        }

        .flatpickr-day {
            border-radius: 8px !important;
        }

        .flatpickr-day.selected {
            background: #4F46E5 !important;
            border-color: #4F46E5 !important;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body
    class="theme-reading-{{ request.cookies.get('theme_reading', 'sans') }} theme-editor-{{ request.cookies.get('theme_editor', 'mono') }}"
    style="margin: 0; background-color: var(--color-bg-app);">
    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}

    <!-- Auto-shutdown mechanism: keeps a WebSocket open to tell the server the app is active -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize custom styled date pickers
            setTimeout(() => {
                try {
                    flatpickr('input[type="date"]', {
                        dateFormat: "Y-m-d",
                        disableMobile: true,
                        locale: "ru",
                        altInput: true,
                        altFormat: "d.m.Y",
                        allowInput: true
                    });
                } catch(e) { console.error("Flatpickr init error:", e); }
            }, 100);
        });

        (function () {
            let ws;
            function connect() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws/ping`;
                ws = new WebSocket(wsUrl);
                ws.onclose = () => {
                    // Try to reconnect if the socket drops but the window is still open
                    setTimeout(connect, 3000);
                };
            }
            // Connect after a short delay to prioritize page load
            setTimeout(connect, 1000);
        })();
    </script>
</body>

</html>
