{% extends "base.html" %}

{% block title %}Error - Papanda{% endblock %}

{% block extra_head %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .error-container { text-align: center; max-width: 500px; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 20px; }
        h1 { color: #dc3545; font-size: 4rem; margin-bottom: 20px; }
        p { color: #6c757d; font-size: 1.2rem; margin-bottom: 30px; }
        .btn-home { background-color: #0d6efd; color: white; border-radius: 25px; padding: 10px 30px; text-decoration: none; transition: 0.3s; display: inline-block; font-family: inherit;}
        .btn-home:hover { background-color: #0b5ed7; transform: translateY(-2px); color: white; }
    </style>
{% endblock %}

{% block content %}
    <div class="error-container">
        <h1>Oops!</h1>
        <p>{{ detail }}</p>
        <a href="/" class="btn-home">Return to Home</a>
    </div>
{% endblock %}
