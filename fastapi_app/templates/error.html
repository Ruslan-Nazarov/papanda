<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка - Papanda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { text-align: center; max-width: 500px; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #dc3545; font-size: 4rem; margin-bottom: 20px; }
        p { color: #6c757d; font-size: 1.2rem; margin-bottom: 30px; }
        .btn-home { background-color: #0d6efd; color: white; border-radius: 25px; padding: 10px 30px; text-decoration: none; transition: 0.3s; }
        .btn-home:hover { background-color: #0b5ed7; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>Opps!</h1>
        <p>{{ detail }}</p>
        <a href="/" class="btn-home">Вернуться на главную</a>
    </div>
</body>
</html>
