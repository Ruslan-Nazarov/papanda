{% extends "base.html" %}

{% block title %}Login — Papanda Dashboard{% endblock %}

{% block extra_head %}
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: var(--radius-lg, 15px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
            text-align: center;
            border: 2px solid #FFE5B4;
        }

        .logo {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 25px;
            color: var(--color-primary, #F2994A);
        }

        h2 { font-weight: normal; margin-bottom: 20px; font-size: 1.1em; color: #555; }

        .form-group { margin-bottom: 15px; text-align: left; }
        
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: var(--radius-sm, 8px);
            font-size: 1em;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }
        input:focus {
            border-color: var(--color-primary, #F2994A);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--color-primary, #F2994A);
            border: none;
            border-radius: var(--radius-sm, 8px);
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            font-family: inherit;
        }
        button:hover {
            background-color: var(--color-primary-dark, #E08E45);
        }

        .error { color: var(--color-error, #ff5252); margin-bottom: 15px; font-size: 0.9em; height: 1em; }
        
        .footer-link {
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
        }
        .footer-link a { color: var(--color-primary, #F2994A); text-decoration: none; font-weight: bold; }
    </style>
{% endblock %}

{% block content %}
    <div class="login-card">
        <div class="logo">Papanda</div>
        <h2>Login to Dashboard</h2>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% else %}
        <div class="error"></div>
        {% endif %}

        <form action="/login" method="post">
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required autofocus>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-top: -5px; margin-bottom: 20px;">
                <input type="checkbox" name="remember_me" id="remember_me" style="width: auto; cursor: pointer;">
                <label for="remember_me" style="color: #666; cursor: pointer; font-size: 0.9em;">Remember me</label>
            </div>
            <button type="submit">Login</button>
        </form>

        <div class="footer-link">
            No account? <a href="/register">Register</a>
        </div>
    </div>
{% endblock %}
