                    <div class="section chronology-section">
                        <div class="widget-header">
                            <h1 class="widget-title">
                                <span class="drag-handle">⠿</span>Chronology
                            </h1>
                            <div style="display: flex; gap: 5px; align-items: center;">
                                <button type="button" title="Open full editor" onclick="openChronoExpandModal()"
                                    style="background: none; border: none; cursor: pointer; font-size: 1.1em; color: #888; padding: 2px 6px; border-radius: 4px; transition: background 0.2s;"
                                    onmouseover="this.style.background='rgba(0,0,0,0.05)'" onmouseout="this.style.background='none'"
                                >⤢</button>
                                <button
                                    type="button"
                                    class="collapse-btn"
                                    onclick="toggleWidget(this)"
                                    title="Свернуть / развернуть"
                                >
                                    ▾
                                </button>
                            </div>
                        </div>
                        <div class="widget-body">


                            <form
                                method="post"
                                action="/submit_chrono"
                                class="chrono-form"
                            >
                                <textarea
                                    name="chrono_text"
                                    required
                                    placeholder="chronology"
                                    style="height: 80px"
                                ></textarea>
                                <div
                                    style="
                                        display: flex;
                                        gap: 5px;
                                        margin-top: 10px;
                                        flex-wrap: wrap;
                                    "
                                >
                                    <input
                                        type="date"
                                        name="chrono_date"
                                        required
                                        value="{{ today_for_calendar.strftime('%Y-%m-%d') }}"
                                        style="width: 150px"
                                    />
                                    <button
                                        type="submit"
                                        class="read-button"
                                        style="
                                            background-color: #f0f0f0;
                                            height: 30px;
                                            border-radius: 5px;
                                            border: 1px solid #ccc;
                                            color: #333;
                                            flex-grow: 1;
                                        "
                                    >
                                        OK
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
