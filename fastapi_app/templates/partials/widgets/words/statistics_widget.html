<div class="premium-card words-widget statistics-widget" style="height: 100%; display: flex; flex-direction: column;">
    <div class="widget-header" style="margin-bottom: 8px;">
        <div class="widget-title">
            <span class="widget-icon">📊</span>
            <span>{{ _('dashboard.statistics') }}</span>
        </div>
        <div class="widget-actions">
            <button type="button" class="btn btn-secondary btn-icon widget-settings-trigger" onclick="WidgetSettings.openColorPicker(this)" title="{{ _('dashboard.widget_color') }}">🎨</button>
            <button type="button" class="btn btn-secondary btn-icon widget-collapse-btn" onclick="toggleWidget(this, 'language')">▼</button>
        </div>
    </div>

    <div class="widget-body" style="padding-top: 0; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
        <div style="font-size: 2.5rem; margin-bottom: 10px;">📈</div>
        <h3 style="margin: 0 0 15px 0; color: var(--color-text-dark);">Языковая аналитика</h3>
        <p style="font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 20px;">Глубокая статистика по изучению слов, тестам и прогрессу по дням.</p>
        <button type="button" class="btn btn-primary" onclick="openWordStatsModal()" style="padding: 10px 24px; border-radius: 20px;">Открыть статистику</button>
    </div>
</div>
