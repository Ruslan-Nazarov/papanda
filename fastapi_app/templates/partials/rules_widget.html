                    <div class="section random-rule">
                        <div class="widget-header">
                            <h1 class="widget-title">
                                <span class="drag-handle">⠿</span>Language Rules
                            </h1>
                            <div class="widget-controls">
                                <button
                                    type="button"
                                    class="collapse-btn"
                                    onclick="toggleWidget(this)"
                                    title="Свернуть / развернуть"
                                    style="margin-left: 0"
                                >
                                    ▾
                                </button>
                                <button
                                    onclick="refreshRule()"
                                    title="Refresh Rule"
                                    class="btn-rule"
                                >
                                    ↻
                                </button>
                                <button
                                    onclick="toggleRule()"
                                    class="btn-rule"
                                >
                                    RU ⇄ EN
                                </button>
                            </div>
                        </div>
                        <div class="widget-body">
                            <div
                                id="rule-lang"
                                style="
                                    background-color: #66bb6a;
                                    color: white;
                                    display: inline-block;
                                    padding: 2px 10px;
                                    border-radius: 5px;
                                    font-weight: bold;
                                    margin-bottom: 10px;
                                "
                            >
                                {{ random_rule.language }}
                            </div>
                            <div
                                style="
                                    font-size: 0.95em;
                                    color: #333;
                                    line-height: 1.4;
                                "
                            >
                                <div id="rule-ru">
                                    {{ random_rule.rule_ru }}
                                </div>
                                <div id="rule-en" style="display: none">
                                    {{ random_rule.rule_en }}
                                </div>
                            </div>
                        </div>
                    </div>
