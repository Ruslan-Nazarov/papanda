<!-- --- WIDGET: ИИ-помощник papanda (Floating Chat Modal) --- -->
<style>
    @keyframes assistantSlideUp {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes assistantPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }
    @keyframes assistantBounce {
        0%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-5px); }
    }
    
    #papanda-assistant-fab {
        position: fixed;
        bottom: 28px;
        right: 90px;
        z-index: 99990;
        background: linear-gradient(135deg, #f97316 0%, #a855f7 50%, #6366f1 100%);
        color: #ffffff;
        border: none;
        border-radius: 30px;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-family-display, 'Outfit', sans-serif);
        font-weight: 600;
        font-size: 14px;
        box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
        cursor: pointer;
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s ease;
    }
    #papanda-assistant-fab:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 15px 35px rgba(168, 85, 247, 0.6);
    }
    #papanda-assistant-fab:active {
        transform: translateY(-1px) scale(0.98);
    }
    .assistant-fab-icon {
        font-size: 18px;
        animation: assistantPulse 3s infinite ease-in-out;
    }
    
    #papanda-assistant-modal {
        position: fixed;
        bottom: 88px;
        right: 28px;
        width: 380px;
        max-width: calc(100vw - 48px);
        height: 520px;
        max-height: calc(100vh - 110px);
        z-index: 99991;
        display: none;
        flex-direction: column;
        background: rgba(15, 23, 42, 0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 24px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(168, 85, 247, 0.2);
        color: #f8fafc;
        font-family: var(--font-family-sans, 'Inter', sans-serif);
        overflow: hidden;
        animation: assistantSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .assistant-header {
        background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(168, 85, 247, 0.25));
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .assistant-header-title {
        font-family: var(--font-family-display, 'Outfit', sans-serif);
        font-weight: 700;
        font-size: 16px;
        color: #ffffff;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .assistant-header-subtitle {
        font-size: 11px;
        color: #cbd5e1;
        margin-top: 2px;
        font-weight: 400;
    }
    .assistant-header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .assistant-icon-btn {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #cbd5e1;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
        font-size: 16px;
    }
    .assistant-icon-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        color: #ffffff;
    }
    
    .assistant-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
    }
    .assistant-messages::-webkit-scrollbar {
        width: 6px;
    }
    .assistant-messages::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 3px;
    }
    
    .assistant-msg {
        max-width: 85%;
        padding: 12px 16px;
        font-size: 13.5px;
        line-height: 1.5;
        word-wrap: break-word;
    }
    .assistant-msg-ai {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: #f1f5f9;
        border-radius: 18px 18px 18px 4px;
    }
    .assistant-msg-user {
        align-self: flex-end;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        color: #ffffff;
        border-radius: 18px 18px 4px 18px;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .assistant-msg-error {
        align-self: flex-start;
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        border-radius: 18px 18px 18px 4px;
    }
    
    .assistant-typing {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 12px 18px;
    }
    .assistant-dot {
        width: 6px;
        height: 6px;
        background: #a855f7;
        border-radius: 50%;
        animation: assistantBounce 1.4s infinite ease-in-out both;
    }
    .assistant-dot:nth-child(1) { animation-delay: -0.32s; }
    .assistant-dot:nth-child(2) { animation-delay: -0.16s; }
    
    .assistant-input-area {
        padding: 14px 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(15, 23, 42, 0.7);
        display: flex;
        gap: 10px;
        align-items: center;
    }
    #papanda-assistant-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 14px;
        padding: 10px 16px;
        color: #ffffff;
        font-size: 13.5px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    #papanda-assistant-input::placeholder {
        color: #94a3b8;
    }
    #papanda-assistant-input:focus {
        border-color: #a855f7;
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
    }
    #papanda-assistant-send {
        background: linear-gradient(135deg, #f97316, #a855f7);
        border: none;
        border-radius: 14px;
        width: 42px;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: white;
        transition: transform 0.2s, opacity 0.2s;
        flex-shrink: 0;
    }
    #papanda-assistant-send:hover {
        transform: scale(1.05);
    }
    #papanda-assistant-send:active {
        transform: scale(0.95);
    }
    #papanda-assistant-send:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }
</style>

<!-- Floating Action Button -->
<button id="papanda-assistant-fab" onclick="togglePapandaAssistant()" title="ИИ-помощник papanda">
    <span class="assistant-fab-icon">✨</span>
    <span>помощник papanda</span>
</button>

<!-- Chat Modal -->
<div id="papanda-assistant-modal">
    <div class="assistant-header">
        <div>
            <div class="assistant-header-title">
                <span>✨</span>
                <span>помощник papanda</span>
            </div>
            <div class="assistant-header-subtitle">умный гид по функционалу</div>
        </div>
        <div class="assistant-header-actions">
            <button class="assistant-icon-btn" onclick="clearPapandaAssistantChat()" title="Очистить диалог"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
            <button class="assistant-icon-btn" onclick="togglePapandaAssistant()" title="Закрыть">✕</button>
        </div>
    </div>
    
    <div class="assistant-messages" id="papanda-assistant-messages">
        <!-- Messages injected via JavaScript -->
    </div>
    
    <div class="assistant-input-area">
        <input type="text" id="papanda-assistant-input" placeholder="Задайте вопрос по функционалу..." autocomplete="off" />
        <button id="papanda-assistant-send" onclick="sendPapandaAssistantMsg()" title="Отправить">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>

<script>
    (function() {
        const locale = window.currentLocale || "ru";
        let assistantHistory = [];
        const welcomes = {
            ru: "Здравствуйте! Я ИИ-помощник по возможностям и функционалу приложения papanda. Чем я могу помочь вам сегодня?",
            kz: "Сәлеметсіз бе! Мен papanda қосымшасының мүмкіндіктері мен функциялары бойынша жасанды интеллект көмекшісімін. Бүгін сізге қалай көмектесе аламын?",
            en: "Hello! I am the AI assistant for papanda features and capabilities. How can I help you today?"
        };
        const placeholders = {
            ru: "Задайте вопрос по функционалу papanda...",
            kz: "papanda функциялары бойынша сұрақ қойыңыз...",
            en: "Ask a question about papanda features..."
        };
        const subtitles = {
            ru: "умный гид по функционалу",
            kz: "функциялар бойынша ақылды гид",
            en: "smart guide to features"
        };
        const btnLabels = {
            ru: "помощник papanda",
            kz: "papanda көмекшісі",
            en: "papanda ai"
        };

        window.initPapandaAssistantUI = function() {
            const subtitleEl = document.querySelector(".assistant-header-subtitle");
            if (subtitleEl) subtitleEl.textContent = subtitles[locale] || subtitles["ru"];
            
            const inputEl = document.getElementById("papanda-assistant-input");
            if (inputEl) inputEl.placeholder = placeholders[locale] || placeholders["ru"];

            const fabSpan = document.querySelector("#papanda-assistant-fab span:nth-child(2)");
            if (fabSpan) fabSpan.textContent = btnLabels[locale] || btnLabels["ru"];

            const container = document.getElementById("papanda-assistant-messages");
            if (container && container.children.length === 0) {
                appendAssistantBubble(welcomes[locale] || welcomes["ru"], "ai");
            }
        };

        function appendAssistantBubble(text, type) {
            const container = document.getElementById("papanda-assistant-messages");
            if (!container) return;
            const bubble = document.createElement("div");
            bubble.className = "assistant-msg " + (type === "user" ? "assistant-msg-user" : (type === "error" ? "assistant-msg-error" : "assistant-msg-ai"));
            
            // Format simple markdown breaks/bold if AI
            if (type === "ai" || type === "error") {
                let formatted = text
                    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
                    .replace(/\n/g, "<br>");
                bubble.innerHTML = formatted;
            } else {
                bubble.textContent = text;
            }
            
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
            return bubble;
        }

        window.togglePapandaAssistant = function() {
            const modal = document.getElementById("papanda-assistant-modal");
            if (!modal) return;
            const isHidden = window.getComputedStyle(modal).display === "none";
            if (isHidden) {
                modal.style.display = "flex";
                initPapandaAssistantUI();
                const input = document.getElementById("papanda-assistant-input");
                if (input) setTimeout(() => input.focus(), 100);
            } else {
                modal.style.display = "none";
            }
        };

        window.clearPapandaAssistantChat = function() {
            assistantHistory = [];
            const container = document.getElementById("papanda-assistant-messages");
            if (container) {
                container.innerHTML = "";
                appendAssistantBubble(welcomes[locale] || welcomes["ru"], "ai");
            }
        };

        window.sendPapandaAssistantMsg = async function() {
            const input = document.getElementById("papanda-assistant-input");
            const sendBtn = document.getElementById("papanda-assistant-send");
            if (!input || !sendBtn) return;
            
            const query = input.value.trim();
            if (!query) return;
            
            appendAssistantBubble(query, "user");
            input.value = "";
            input.disabled = true;
            sendBtn.disabled = true;

            // Show loader
            const container = document.getElementById("papanda-assistant-messages");
            const loader = document.createElement("div");
            loader.className = "assistant-msg assistant-msg-ai assistant-typing";
            loader.innerHTML = '<div class="assistant-dot"></div><div class="assistant-dot"></div><div class="assistant-dot"></div>';
            container.appendChild(loader);
            container.scrollTop = container.scrollHeight;

            try {
                const res = await fetch("/api/v1/assistant", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: query, page: window.location.pathname, history: assistantHistory })
                });
                
                loader.remove();
                
                if (res.ok) {
                    const data = await res.json();
                    const answerText = data.answer || "Нет ответа от сервиса.";
                    appendAssistantBubble(answerText, "ai");
                    assistantHistory.push({ role: "user", content: query });
                    assistantHistory.push({ role: "assistant", content: answerText });
                    if (assistantHistory.length > 6) assistantHistory = assistantHistory.slice(-6);
                } else {
                    const errData = await res.json().catch(() => ({}));
                    const errMsg = errData.detail || "Сервер вернул ошибку при обработке запроса.";
                    appendAssistantBubble("Извините, ошибка: " + errMsg, "error");
                }
            } catch (e) {
                loader.remove();
                appendAssistantBubble("Извините, не удалось связаться с сервером. Проверьте подключение к сети.", "error");
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        };

        document.addEventListener("DOMContentLoaded", function() {
            const input = document.getElementById("papanda-assistant-input");
            if (input) {
                input.addEventListener("keydown", function(e) {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        sendPapandaAssistantMsg();
                    }
                });
            }
        });
    })();
</script>
