<style>
    /* Scoped styles for the language learning modal */
    #languageLearningModal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1050;
        display: none; /* hidden by default */
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(4px);
    }

    #languageLearningModal .modal-content-wrapper {
        background-color: #fff5ec;
        color: #333;
        width: 95%;
        max-width: 1200px;
        max-height: 90vh;
        border-radius: 28px;
        box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        position: relative;
    }

    #languageLearningModal .learning-container {
        width: 100%;
        padding: 40px 30px;
        box-sizing: border-box;
    }

    #languageLearningModal .close-modal-btn {
        position: absolute;
        top: 20px;
        right: 25px;
        font-size: 24px;
        color: #888;
        cursor: pointer;
        transition: color 0.2s;
        z-index: 10;
        background: rgba(255,255,255,0.7);
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
    }
    #languageLearningModal .close-modal-btn:hover {
        color: #333;
        background: #fff;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    #languageLearningModal .header-layout {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 30px;
        margin-bottom: 40px;
    }

    #languageLearningModal .title-block {
        flex: 0 0 350px;
    }

    #languageLearningModal .sticker-canvas-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        background: rgba(0,0,0,0.03);
        border-radius: 20px;
        padding: 6px;
        border: 1px solid rgba(0,0,0,0.05);
        min-height: 130px;
        overflow: hidden;
    }

    #languageLearningModal .sticker-canvas {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        gap: 15px;
        padding: 5px;
        width: 100%;
        scroll-behavior: smooth;
    }

    #languageLearningModal .sticker-canvas::-webkit-scrollbar {
        height: 6px;
    }

    #languageLearningModal .sticker-canvas::-webkit-scrollbar-thumb {
        background: #e0e0e0;
        border-radius: 10px;
    }

    #languageLearningModal .add-sticker-btn {
        flex-shrink: 0;
        width: 80px;
        height: 110px;
        border: 2px dashed #bdc3c7;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.8em;
        color: #bdc3c7;
        cursor: pointer;
        transition: all 0.2s;
        margin-right: 10px;
        font-family: var(--font-heading);
    }

    #languageLearningModal .add-sticker-btn:hover {
        border-color: #7f8c8d;
        color: #7f8c8d;
        background: rgba(255,255,255,0.5);
        transform: translateY(-2px);
    }

    #languageLearningModal .sticker-canvas .sticker-thought {
        flex-shrink: 0;
        width: 140px !important;
        height: 110px !important;
        margin: 0 !important;
        font-size: 0.85em;
        position: relative;
        transform: rotate(0deg) !important;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border-radius: 12px;
        overflow: hidden;
    }

    #languageLearningModal .learning-card {
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        border: 1px solid #f0e0d0;
        margin-bottom: 20px;
        text-align: center;
    }

    #languageLearningModal .sentence-display {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 15px;
        min-height: 220px;
        margin: 40px 0;
        flex-wrap: wrap;
        padding: 20px;
        background: #fafafa;
        border-radius: 20px;
        border: 1px dashed #eee;
        position: relative;
    }

    #languageLearningModal .word-slot {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        min-width: 60px;
        transition: all 0.3s;
    }

    #languageLearningModal .word-label {
        font-size: 0.65rem;
        font-weight: 800;
        color: #95a5a6;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 2px 6px;
        border-radius: 4px;
        background: #eee;
        opacity: 0;
        transition: opacity 0.3s;
    }

    #languageLearningModal .word-slot.visible .word-label {
        opacity: 1;
    }

    #languageLearningModal .word-box {
        font-size: 2rem;
        font-weight: 700;
        padding: 8px 16px;
        border-radius: 12px;
        background: white;
        color: #2c3e50;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border-bottom: 4px solid #dfe6e9;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        white-space: nowrap;
    }

    #languageLearningModal .word-slot.visible .word-box {
        opacity: 1;
        transform: translateY(0);
    }

    #languageLearningModal .word-part { display: inline-block; }
    #languageLearningModal .word-part.ending { color: #e74c3c; font-weight: 800; }
    #languageLearningModal .word-part.suffix { color: #2980b9; }

    #languageLearningModal .word-translation {
        font-size: 0.85rem;
        color: #7f8c8d;
        font-weight: 500;
        opacity: 0;
        transition: opacity 0.3s;
        max-width: 120px;
        text-align: center;
        line-height: 1.2;
    }

    #languageLearningModal .show-translation .word-slot.visible .word-translation {
        opacity: 1;
    }

    #languageLearningModal .flash-mode .word-label,
    #languageLearningModal .flash-mode .word-translation {
        display: none !important;
    }
    
    #languageLearningModal .flash-mode .word-box {
        border-bottom-color: transparent !important;
        box-shadow: none !important;
        background: transparent !important;
        opacity: 1 !important;
        transform: none !important;
    }

    #languageLearningModal .flash-mode .word-part {
        color: inherit !important;
        font-weight: inherit !important;
    }

    #languageLearningModal .role-Predicate .word-box { border-color: #ff7675; }
    #languageLearningModal .role-Subject .word-box { border-color: #74b9ff; }
    #languageLearningModal .role-Attribute_Subject .word-box { border-color: #55efc4; }
    #languageLearningModal .role-Attribute_Object .word-box { border-color: #55efc4; }
    #languageLearningModal .role-Object .word-box { border-color: #a29bfe; }
    #languageLearningModal .role-Circumstance .word-box,
    #languageLearningModal .role-Adverbial .word-box { border-color: #ffeaa7; }

    #languageLearningModal .role-Predicate .word-label { color: #d63031; background: #fff5f5; }
    #languageLearningModal .role-Subject .word-label { color: #0984e3; background: #f0f7ff; }
    #languageLearningModal .role-Attribute_Subject .word-label { color: #00b894; background: #f0fffb; }
    #languageLearningModal .role-Attribute_Object .word-label { color: #00b894; background: #f0fffb; }
    #languageLearningModal .role-Object .word-label { color: #6c5ce7; background: #f5f3ff; }
    #languageLearningModal .role-Circumstance .word-label,
    #languageLearningModal .role-Adverbial .word-label { color: #e67e22; background: #fffcf0; }

    #languageLearningModal .controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 30px;
    }

    #languageLearningModal .btn-action {
        padding: 12px 30px;
        border-radius: 30px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: inherit;
    }

    #languageLearningModal .btn-run { background: #2c3e50; color: white; }
    #languageLearningModal .btn-run:hover { background: #34495e; transform: scale(1.05); }

    #languageLearningModal .btn-toggle { background: #fdfaf7; color: #f2994a; border: 1px solid #f2994a; }
    #languageLearningModal .btn-toggle.active { background: #f2994a; color: white; }

    #languageLearningModal .lang-selector {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 30px;
    }

    #languageLearningModal .lang-btn {
        padding: 8px 20px;
        border: 2px solid #ddd;
        background: white;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
    }

    #languageLearningModal .lang-btn.active {
        border-color: #f2994a;
        color: #f2994a;
    }

    #languageLearningModal .legend {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 40px;
        font-size: 0.8rem;
        color: #888;
    }
    #languageLearningModal .legend-item { display: flex; align-items: center; gap: 5px; }
    #languageLearningModal .dot { width: 10px; height: 10px; border-radius: 50%; }
</style>

<div id="languageLearningModal" onclick="if(event.target===this) closeLanguageLearningModal()">
    <div class="modal-content-wrapper">
        <div class="close-modal-btn" onclick="closeLanguageLearningModal()" title="Close">✕</div>
        <div class="learning-container">

            <div class="header-layout">
                <div class="title-block">
                    <h1 style="margin-top: 0; margin-bottom: 10px;">Sentence Trainer</h1>
                    <p style="margin: 0; display: flex; align-items: center; gap: 15px;">
                        <span style="color: #666;">Learn structural logic word by word.</span>
                    </p>
                </div>
                
                <div class="sticker-canvas-wrapper">
                    <div class="add-sticker-btn" onclick="window.openLanguageStickerModal()" title="Add Note">+</div>
                    <div id="languageStickersCanvas" class="sticker-canvas"></div>
                </div>
            </div>

            <div class="learning-card" style="position: relative;">
                <span id="sentence-progress" style="position: absolute; top: 40px; right: 40px; font-size: 0.85em; background: #f5f5f5; border: 1px solid #eee; padding: 6px 14px; border-radius: 12px; color: #888; font-weight: 600; display: none; white-space: nowrap;"></span>
                
                <div id="lang-selector" class="lang-selector">
                    <!-- Buttons dynamically generated -->
                </div>

                <div id="sentence-display" class="sentence-display" onclick="handleDisplayClick()">
                    <!-- Words injected here -->
                </div>

                <div class="controls">
                    <button class="btn-action btn-run" onclick="runFlash()">
                        <span>▶</span> Start
                    </button>
                    <button id="toggle-translation" class="btn-action btn-toggle" onclick="toggleTranslation()">
                        👁 Translation
                    </button>
                    <button class="btn-action" style="background: #eee;" onclick="nextSentence()">
                        Next ➜
                    </button>
                </div>

                <div class="legend">
                    <div class="legend-item"><span class="dot" style="background: #ff7675;"></span> Predicate</div>
                    <div class="legend-item"><span class="dot" style="background: #74b9ff;"></span> Subject</div>
                    <div class="legend-item"><span class="dot" style="background: #55efc4;"></span> Attributes</div>
                    <div class="legend-item"><span class="dot" style="background: #a29bfe;"></span> Object</div>
                    <div class="legend-item"><span class="dot" style="background: #ffeaa7;"></span> Circumstance</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script id="sentences-data" type="application/json">
    {{ sentences_json | safe }}
</script>

<script>
    window.LANG_ANCHORS = {{ lang_anchors_json | default('{}') | safe }};
</script>
