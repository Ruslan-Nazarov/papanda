<!-- Custom Confirmation Modal (Shared) -->
<div id="customConfirmModal" class="modal premium-confirm">
    <style>
        .premium-confirm .modal-content {
            border-radius: 28px;
            border: none;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            padding: 0;
            overflow: hidden;
            background: #fff;
            max-width: 420px !important;
            height: auto !important; /* Ensure it doesn't stretch */
            margin: auto; /* Center vertically if flex container allows */
        }
        .premium-confirm .modal-header {
            padding: 24px 32px 12px;
            background: #fff;
            border: none;
            text-align: center;
        }
        .premium-confirm .modal-header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 850;
            color: var(--color-text-dark);
            width: 100%;
            text-align: center;
        }
        .premium-confirm .modal-body {
            padding: 24px 40px 32px;
            text-align: center;
        }
        .premium-confirm .confirm-icon-wrapper {
            display: none; /* Removed as requested */
        }
        .premium-confirm .modal-footer {
            padding: 24px 32px;
            background: var(--color-bg-subtle);
            display: flex;
            gap: 12px;
            justify-content: center;
            border-top: 1px solid var(--color-bg-app);
        }
        .premium-confirm .btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-weight: 750;
            font-size: 0.95rem;
            transition: all 0.2s;
            border: none;
        }
        .premium-confirm .confirm-btn-secondary {
            background: #fff;
            color: var(--color-text-body);
            border: 1.5px solid var(--color-bg-app) !important;
        }
        .premium-confirm .confirm-btn-danger {
            background: linear-gradient(135deg, var(--color-error), #ff5252);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 82, 82, 0.3);
        }
        .premium-confirm .confirm-btn-primary {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: #fff;
            box-shadow: 0 4px 15px var(--color-primary-soft);
        }
    </style>

    <div class="modal-content">
        <div class="modal-header">
            <h2 id="confirmModalTitle">Confirmation</h2>
        </div>
        <div class="modal-body">
            <div id="confirmModalIconWrapper" class="confirm-icon-wrapper">
                <span id="confirmModalIcon">⚠️</span>
            </div>
            <div id="confirmModalMessage" style="font-weight: 600; font-size: 1.1rem; color: var(--color-text-dark); line-height: 1.4; padding: 0 10px;">Are you sure you want to proceed?</div>
        </div>
        <div class="modal-footer" id="confirmModalFooter">
            <!-- Buttons will be injected here via JS -->
        </div>
    </div>
</div>
