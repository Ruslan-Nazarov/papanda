<!-- Custom Confirmation Modal (Shared) -->
<div id="customConfirmModal" class="modal premium-confirm" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); z-index: 99999;">


    <div class="modal-content">
        <div class="modal-header">
            <h2 id="confirmModalTitle">{{ _('modal.confirmation') }}</h2>
        </div>
        <div class="modal-body" style="display: flex; align-items: center; gap: 15px; padding: 25px 20px;">
            <div id="confirmModalIconWrapper" class="confirm-icon-wrapper" style="font-size: 1.5rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin: 0;">
                <span id="confirmModalIcon">⚠️</span>
            </div>
            <div id="confirmModalMessage" style="font-weight: 600; font-size: 1.1rem; color: var(--color-text-dark); line-height: 1.4; padding: 0;">{{ _('modal.are_you_sure') }}</div>
        </div>
        <div class="modal-footer" id="confirmModalFooter">
            <!-- Buttons will be injected here via JS -->
        </div>
    </div>
</div>
