{% from "partials/components/inputs.html" import premium_input %}





<!-- Expanded Editor Modal (Dashboard Entry) -->
<div id="expandedNoteEditorModal" class="modal premium-modal" data-prevent-outside-click="true">
    <div class="modal-content" style="max-width: 1100px; width: 95%; border-top: 6px solid var(--color-primary);">
        <div class="modal-header" style="flex-shrink: 0;">
            <h3><span style="color: var(--color-primary);">⚡</span> {{ _('dashboard.expanded_editor') }}</h3>
            <button type="button" class="btn btn-secondary btn-icon" onclick="notesWidget.closeExpandedEditor()" style="border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; padding: 0;">✕</button>
        </div>
        
        <div class="modal-body">
            <input type="hidden" id="expandedNoteId">
            <div class="editor-layout">
                
                <!-- LEFT: Meta -->
                <div class="editor-meta">
                    <div style="margin-bottom: 20px;">
                        <label style="font-size: 0.7rem; font-weight: 850; text-transform: uppercase; color: var(--color-text-muted); letter-spacing: 0.8px; margin-bottom: 10px; display: block;">🏷️ {{ _('dashboard.category') }}</label>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <select id="expandedNoteCategory" class="form-input" style="flex: 1; height: 40px; border-radius: 10px; border: 1.5px solid var(--color-border-light); background: var(--color-bg-white); font-size: 0.9rem;">
                                {% if categories %}
                                    {% for cat in categories %}
                                        <option value="{{ cat }}">{{ cat }}</option>
                                    {% endfor %}
                                {% endif %}
                            </select>
                            <button type="button" class="btn btn-secondary" onclick="notesWidget.showAddCategoryModal()" title="{{ _('dashboard.add_category') }}" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; border-radius: 10px; flex-shrink: 0;">+</button>
                        </div>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label style="font-size: 0.7rem; font-weight: 850; text-transform: uppercase; color: var(--color-text-muted); letter-spacing: 0.8px; margin-bottom: 14px; display: block;">📌 {{ _('dashboard.status') }}</label>
                        <label class="premium-checkbox-wrapper">
                            <input type="checkbox" id="expandedNotePin">
                            <div class="checkbox-custom"></div>
                            <span style="font-weight: 600; color: var(--color-text-dark); font-size: 0.9rem;">{{ _('dashboard.pinned_to_dashboard') }}</span>
                        </label>
                    </div>

                    <div id="expandedNoteStickersSection" style="border-top: 1px solid var(--color-border-light); padding-top: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <label style="margin: 0; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--color-text-muted);">{{ _('dashboard.linked_stickers') }}</label>
                            <button type="button" class="btn-text-action" onclick="notesWidget.manageStickersForNewNote()" style="font-size: 0.78rem;">{{ _('dashboard.manage') }}</button>
                        </div>
                        <div id="expandedNoteStickersList" style="display: flex; flex-wrap: wrap; gap: 6px;">
                            <span style="color: var(--color-text-faint); font-size: 0.85rem; font-style: italic;">{{ _('dashboard.no_stickers_linked') }}</span>
                        </div>
                    </div>
                </div>

                <!-- RIGHT: Main Editor -->
                <div class="editor-main">
                    <textarea id="expandedNoteTextarea" placeholder="{{ _('dashboard.write_your_story') }}"></textarea>
                </div>
            </div>
        </div>

        <div class="modal-footer" style="flex-shrink: 0;">
            <button type="button" class="btn btn-secondary" onclick="notesWidget.closeExpandedEditor()" style="border-radius: 12px; padding: 10px 24px; font-weight: 600;">{{ _('dashboard.cancel') }}</button>
            <button type="button" class="btn btn-primary" onclick="notesWidget.saveNote(true)" style="border-radius: 12px; padding: 10px 28px; font-weight: 700;">💾 {{ _('dashboard.save_note') }}</button>
        </div>
    </div>
</div>

<!-- Add Category Modal (Shared Mechanics) -->
<div id="addCategoryModal" class="modal premium-modal" style="z-index: 3000;">
    <div class="modal-content" style="max-width: 450px; border-top: 6px solid var(--color-primary);">
        <div class="modal-header">
            <h3 style="margin: 0;"><span style="color: var(--color-primary);">📂</span> {{ _('dashboard.new_category') }}</h3>
            <button class="modal-close" onclick="ModalManager.close('addCategoryModal')">✕</button>
        </div>
        <div class="modal-body" style="padding: 32px !important;">
            <div class="form-group-premium">
                <label class="form-label">{{ _('dashboard.category_name') }}</label>
                {{ premium_input(id='newCategoryName', placeholder=_('dashboard.category_example')) }}
            </div>
        </div>
        <div class="modal-footer" style="background: var(--color-bg-subtle);">
            <button type="button" class="btn btn-secondary" onclick="ModalManager.close('addCategoryModal')">{{ _('dashboard.cancel') }}</button>
            <button type="button" class="btn btn-primary" onclick="notesWidget.saveNewCategory()">{{ _('dashboard.create') }}</button>
        </div>
    </div>
</div>
