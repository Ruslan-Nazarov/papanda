<!-- Chronology Edit/Add Modal -->
<div id="editChronoModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="chronoModalHeader">Chronology Entry</h3>
        </div>
        
        <div class="modal-body">
            <input type="hidden" id="editChronoId">
            <input type="hidden" id="expandChronoId" />
            
            <div class="form-group">
                <label class="form-label">Target Date & Time</label>
                <input type="datetime-local" id="editChronoDate" class="form-input">
                <input type="date" id="expandChronoDate" style="display:none;">
            </div>

            <div class="form-group">
                <label class="form-label">Event Description</label>
                <textarea id="editChronoTitle" class="form-input" style="height: 350px; resize: vertical; font-size: 1.1rem; line-height: 1.6;" placeholder="Tell your story..."></textarea>
                <textarea id="expandChronoText" style="display:none;"></textarea>
            </div>

            <div id="editChronoError" class="form-error-text"></div>
            <div id="expandChronoError" style="display:none;"></div>
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeEditChronoModal()">Cancel</button>
            <button type="button" class="btn btn-primary" onclick="saveChronoEdit()">Save Entry</button>
        </div>
    </div>
</div>

<!-- Chronology View Modal (Read-Only) -->
<div id="chronoViewModal" class="modal">
    <div class="modal-content" style="width: 750px;">
        <div class="modal-header">
            <h3 id="chronoViewDate" style="color: var(--color-indigo);"></h3>
        </div>
        <div class="modal-body">
            <div id="chronoViewFullText" class="chrono-view-text" style="font-size: 1.15rem; line-height: 1.8; color: var(--color-text-body);"></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeChronoViewModal()">Close</button>
        </div>
    </div>
</div>
