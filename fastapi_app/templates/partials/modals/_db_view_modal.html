<style>
    #dbViewModal {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        z-index: 1040;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(4px);
    }
    #dbViewModal .modal-content-wrapper {
        background-color: var(--color-bg-app);
        color: var(--color-text-dark);
        width: 95%;
        max-width: 1300px;
        height: 90vh;
        border-radius: 28px;
        box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
    }
    #dbViewModal .modal-header-custom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 30px;
        border-bottom: 1px solid var(--color-bg-subtle);
        background: var(--color-bg-white);
        z-index: 10;
        gap: 20px;
    }
    #dbViewModal .modal-title {
        font-size: 1.4rem;
        font-weight: 800;
        margin: 0;
        white-space: nowrap;
    }
    /* Centralized search bar */
    #dbViewModalSearchWrap {
        flex: 1;
        max-width: 400px;
        position: relative;
        display: flex;
        align-items: center;
    }
    #dbViewModalSearch {
        width: 100%;
        height: 38px;
        padding: 0 36px 0 14px;
        border-radius: 20px;
        border: 1.5px solid var(--color-border-light);
        font-size: 0.9rem;
        background: var(--color-bg-app);
        outline: none;
        transition: border-color 0.2s;
    }
    #dbViewModalSearch:focus { border-color: var(--color-primary); }
    #dbViewModalSearchClear {
        position: absolute;
        right: 10px;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        color: var(--color-text-muted);
        display: none;
        line-height: 1;
        padding: 0;
    }
    #dbViewModal .close-modal-btn {
        font-size: 24px;
        color: #888;
        cursor: pointer;
        transition: color 0.2s;
        width: 40px; height: 40px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%;
        background: rgba(0,0,0,0.05);
        flex-shrink: 0;
    }
    #dbViewModal .close-modal-btn:hover { color: #333; background: rgba(0,0,0,0.1); }

    #dbViewModalContent {
        flex: 1;
        overflow-y: auto;
        padding: 20px 30px;
        position: relative;
    }
    /* Search no-result message */
    #dbViewSearchEmpty {
        display: none;
        padding: 60px 20px;
        text-align: center;
        color: var(--color-text-muted);
        font-size: 1rem;
    }
    .db-view-loader {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        height: 100%; color: var(--color-text-muted);
    }
    .db-view-loader .spinner {
        width: 40px; height: 40px;
        border: 4px solid var(--color-border-light);
        border-top-color: var(--color-primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>

<div id="dbViewModal" onclick="if(event.target===this) closeDbViewModal()">
    <div class="modal-content-wrapper">
        <div class="modal-header-custom">
            <h2 class="modal-title" id="dbViewModalTitle">Loading...</h2>

            <!-- Centralized search — hidden for Event/Calendar -->
            <div id="dbViewModalSearchWrap">
                <input type="text" id="dbViewModalSearch" placeholder="Search..."
                       oninput="dbViewModalSearchFn(this.value)">
                <button id="dbViewModalSearchClear"
                        onclick="dbViewModalSearchFn(''); document.getElementById('dbViewModalSearch').value='';">✕</button>
            </div>

            <div class="close-modal-btn" onclick="closeDbViewModal()" title="Close">✕</div>
        </div>
        <div id="dbViewModalContent">
            <!-- Content loaded via AJAX -->
        </div>
        <div id="dbViewSearchEmpty">No matching records found.</div>
    </div>
</div>

<script>
    const _dbViewModalTitles = {
        'Chronology': '📜 Chronology',
        'Task': '📋 Tasks',
        'Notes': '📓 Notes',
        'Habit': '⚡ Habits',
        'Event': '📅 Calendar',
        'Stickers': '🗒️ Stickers'
    };
    // Models where the search bar is not applicable (they have own search/filter)
    const _dbViewNoSearch = ['Event'];

    window.openDbViewModal = async function(modelName) {
        const modal = document.getElementById('dbViewModal');
        const content = document.getElementById('dbViewModalContent');
        const title = document.getElementById('dbViewModalTitle');
        const searchWrap = document.getElementById('dbViewModalSearchWrap');
        const searchInput = document.getElementById('dbViewModalSearch');
        const searchEmpty = document.getElementById('dbViewSearchEmpty');

        title.innerText = _dbViewModalTitles[modelName] || modelName;

        // Reset search state
        searchInput.value = '';
        searchWrap.style.display = _dbViewNoSearch.includes(modelName) ? 'none' : 'flex';
        document.getElementById('dbViewModalSearchClear').style.display = 'none';
        searchEmpty.style.display = 'none';

        content.innerHTML = '<div class="db-view-loader"><div class="spinner"></div><div>Loading ' + modelName + '...</div></div>';
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';

        try {
            const response = await fetch('/api/ui/db_view/' + modelName);
            if (!response.ok) throw new Error('Network response was not ok');
            const html = await response.text();
            content.innerHTML = html;

            // Re-execute scripts from injected HTML
            content.querySelectorAll('script').forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.textContent = oldScript.textContent;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });

        } catch (error) {
            console.error('Error loading modal content:', error);
            content.innerHTML = '<div style="color:var(--color-error); padding: 20px;">Failed to load content. Please try again.</div>';
        }

        // Auto-initialize pagination after injecting HTML
        if (window.initPagination) {
            setTimeout(() => {
                content.querySelectorAll('.load-more-container').forEach(container => {
                    const grid = container.previousElementSibling;
                    if (grid && grid.id) {
                        window.initPagination(grid.id, container.id, 10, 10);
                    }
                });
            }, 50);
        }
    };

    window.closeDbViewModal = function() {
        document.getElementById('dbViewModal').style.display = 'none';
        document.body.style.overflow = '';
        // Reset search
        const inp = document.getElementById('dbViewModalSearch');
        if (inp) { inp.value = ''; dbViewModalSearchFn(''); }
    };

    // Centralized search: filters all .db-card[data-id] inside the modal content
    window.dbViewModalSearchFn = function(query) {
        const content = document.getElementById('dbViewModalContent');
        const clearBtn = document.getElementById('dbViewModalSearchClear');
        const empty = document.getElementById('dbViewSearchEmpty');
        if (!content) return;

        const q = (query || '').toLowerCase().trim();
        clearBtn.style.display = q ? '' : 'none';

        const allCards = Array.from(content.querySelectorAll('.db-card[data-id]'));
        const sections = Array.from(content.querySelectorAll('h2, .load-more-container, [class$="-management-view"] > *:not([class*="grid"])'));

        if (!q) {
            allCards.forEach(c => c.style.removeProperty('display'));
            sections.forEach(s => s.style.removeProperty('display'));
            empty.style.display = 'none';
            if (window.initPagination) {
                content.querySelectorAll('.load-more-container').forEach(container => {
                    const grid = container.previousElementSibling;
                    if (grid && grid.id) {
                        window.initPagination(grid.id, container.id, 10, 10);
                    }
                });
            }
            return;
        }

        content.querySelectorAll('.load-more-container, h2').forEach(el => el.style.display = 'none');
        let anyVisible = false;
        allCards.forEach(card => {
            const text = card.textContent.toLowerCase();
            const match = text.includes(q);
            card.style.display = match ? '' : 'none';
            if (match) anyVisible = true;
        });
        empty.style.display = anyVisible ? 'none' : '';
    };

    // Centralized Detail Modal Logic
    let _currentCardDetail = null;

    function _openDetailModal() {
        const m = document.getElementById('dbCardDetailModal');
        if (m) { m.style.display = 'flex'; }
    }

    function _closeDetailModal() {
        const m = document.getElementById('dbCardDetailModal');
        if (m) { m.style.display = 'none'; }
        _currentCardDetail = null;
    }

    window.openDbCardDetail = function(config) {
        _currentCardDetail = config;

        const modal = document.getElementById('dbCardDetailModal');
        const headerTitle = document.getElementById('dbCardDetailTitle');
        const headerDate = document.getElementById('dbCardDetailDate');
        const headerCat = document.getElementById('dbCardDetailCat');
        const bodyText = document.getElementById('dbCardDetailBody');

        headerTitle.innerText = config.title || 'Details';
        headerDate.innerText = config.date ? '📅 ' + config.date : '';

        if (config.category) {
            headerCat.innerText = config.category;
            headerCat.style.display = 'inline-block';
        } else {
            headerCat.style.display = 'none';
        }

        bodyText.innerText = config.body || '';

        const extraBoard = document.getElementById('dbCardDetailExtraBoard');
        const extraList = document.getElementById('dbCardDetailExtraList');
        if (extraBoard && extraList) {
            extraBoard.style.display = 'none';
            extraList.innerHTML = '';
            if (typeof config.onRenderExtra === 'function') {
                config.onRenderExtra(extraBoard, extraList);
            }
        }

        _openDetailModal();
    };

    window.closeDbCardDetail = function() {
        _closeDetailModal();
    };

    window.handleDbCardEdit = async function() {
        console.log("handleDbCardEdit clicked. current config:", _currentCardDetail);
        if (_currentCardDetail && typeof _currentCardDetail.onEdit === 'function') {
            const editFn = _currentCardDetail.onEdit;
            console.log("Found editFn, closing detail modal.");
            try {
                const result = editFn();
                if (result instanceof Promise) {
                    await result;
                }
            } catch(e) {
                console.error("Error executing editFn:", e);
                alert("Error opening edit modal: " + e.message);
            } finally {
                const m = document.getElementById('dbCardDetailModal');
                if (m) {
                    const oldBg = m.style.background;
                    const oldBlur = m.style.backdropFilter;
                    m.style.background = 'transparent';
                    m.style.backdropFilter = 'none';
                    setTimeout(() => {
                        _closeDetailModal();
                        m.style.background = oldBg;
                        m.style.backdropFilter = oldBlur;
                    }, 300);
                } else {
                    _closeDetailModal();
                }
            }
        } else {
            console.warn("No edit function found for this card.");
        }
    };

    window.handleDbCardDelete = function() {
        if (_currentCardDetail && typeof _currentCardDetail.onDelete === 'function') {
            const deleteFn = _currentCardDetail.onDelete;
            try {
                deleteFn();
            } finally {
                _closeDetailModal();
            }
        }
    };
</script>

<!-- Centralized Card Detail Modal (Appears over the main dbViewModal) -->
<div id="dbCardDetailModal" class="modal premium-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1050; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);" onclick="if(event.target===this) closeDbCardDetail()">
    <div class="modal-content" style="max-width: 850px; background: var(--color-bg-app); border-radius: 28px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; width: 95%;">
        
        <div class="modal-header" style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--color-bg-subtle); padding: 24px 32px; background: var(--color-bg-white);">
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <h2 id="dbCardDetailTitle" style="margin: 0; font-size: 1.4rem; font-weight: 800; color: var(--color-text-dark);"></h2>
                    <span id="dbCardDetailCat" class="badge-premium" style="display:none; font-size: 0.75rem; padding: 4px 10px; background: var(--color-primary-soft); color: var(--color-primary); border-radius: 6px; font-weight: 800; text-transform: uppercase;"></span>
                </div>
                <div id="dbCardDetailDate" style="font-size: 0.9rem; color: var(--color-text-muted); font-weight: 600;"></div>
            </div>
            <button type="button" class="btn btn-secondary btn-icon" onclick="closeDbCardDetail()" style="border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; padding: 0; border: none; background: rgba(0,0,0,0.05);">✕</button>
        </div>
        
        <div class="modal-body" style="padding: 32px; flex: 1; overflow-y: auto; max-height: 60vh;">
            <div id="dbCardDetailBody" class="premium-note-display" style="font-size: 1.1rem; line-height: 1.7; color: var(--color-text-dark); background: var(--color-bg-subtle); padding: 28px; border-radius: var(--radius-lg); border: 1px solid var(--color-border-light); white-space: pre-wrap; word-break: break-word;"></div>
            
            <div id="dbCardDetailExtraBoard" style="display: none; border-top: 1px solid var(--color-border-light); padding-top: 24px; margin-top: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h4 style="margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--color-text-muted);">Linked Items</h4>
                </div>
                <div id="dbCardDetailExtraList" style="display: flex; flex-wrap: wrap; gap: 12px;"></div>
            </div>
        </div>
        
        <div class="modal-footer" style="padding: 20px 32px; background: var(--color-bg-white); display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid var(--color-bg-subtle);">
            <button type="button" class="btn btn-error" onclick="handleDbCardDelete()" style="border-radius: 14px; font-weight: 700; padding: 12px 24px;">Delete</button>
            <button type="button" class="btn btn-primary" onclick="handleDbCardEdit()" style="border-radius: 14px; font-weight: 700; padding: 12px 24px; background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark)); border: none;">Edit</button>
        </div>
    </div>
</div>
