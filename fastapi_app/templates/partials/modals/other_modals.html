<!-- Habit Edit Modal — Horizontal Layout -->
<div id="editHabitModal" class="modal premium-modal" data-prevent-outside-click="true">
    <div class="modal-content" style="max-width: 900px; width: 95%; border-top: 6px solid var(--color-primary);">
        <div class="modal-header" style="flex-shrink: 0;">
            <h3><span style="color: var(--color-primary);">⚡</span> {{ _('dashboard.edit_habit') }}</h3>
            <button type="button" class="btn btn-secondary btn-icon" onclick="ModalManager.close('editHabitModal')" style="border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; padding: 0;">✕</button>
        </div>

        <div class="modal-body">
            <input type="hidden" id="editHabitId">
            <div class="editor-layout">

                <!-- LEFT: Dates & controls -->
                <div class="editor-meta">
                    <div>
                        <label style="font-size: 0.7rem; font-weight: 850; text-transform: uppercase; color: var(--color-text-muted); letter-spacing: 0.8px; margin-bottom: 10px; display: block;">📅 {{ _('dashboard.start_date') }}</label>
                        <input type="date" id="editHabitStartDate" class="form-input" style="width: 100%; border-radius: 10px; border: 1.5px solid var(--color-border-light); padding: 10px 12px; background: var(--color-bg-white); font-size: 0.9rem;">
                    </div>
                    <div id="editHabitEndDateGroup">
                        <label style="font-size: 0.7rem; font-weight: 850; text-transform: uppercase; color: var(--color-text-muted); letter-spacing: 0.8px; margin-bottom: 10px; display: block;">🏁 {{ _('dashboard.end_date') }}</label>
                        <input type="date" id="editHabitEndDate" class="form-input" style="width: 100%; border-radius: 10px; border: 1.5px solid var(--color-border-light); padding: 10px 12px; background: var(--color-bg-white); font-size: 0.9rem;">
                    </div>
                    <div>
                        <label class="premium-checkbox-wrapper">
                            <input type="checkbox" id="editHabitRead" onchange="toggleHabitEndDate()">
                            <div class="checkbox-custom"></div>
                            <span style="font-weight: 600; color: var(--color-text-dark); font-size: 0.9rem;">{{ _('dashboard.mark_as_finished') }}</span>
                        </label>
                    </div>
                    <div id="editHabitError" style="color: var(--color-error); font-size: 0.82rem; font-weight: 700;"></div>
                </div>

                <!-- RIGHT: Habit title -->
                <div class="editor-main" style="padding: 28px 32px;">
                    <label style="font-size: 0.7rem; font-weight: 850; text-transform: uppercase; color: var(--color-text-muted); letter-spacing: 0.8px; margin-bottom: 14px; display: block;">📝 {{ _('dashboard.habit_title') }}</label>
                    <input type="text" id="editHabitTitle" class="form-input" placeholder="{{ _('dashboard.what_habit_tracking') }}"
                        style="font-size: 1.2rem; font-weight: 600; border: none; border-bottom: 2px solid var(--color-border-light); border-radius: 0; padding: 12px 0; background: transparent; outline: none; color: var(--color-text-dark); width: 100%;">
                </div>
            </div>
        </div>

        <div class="modal-footer" style="flex-shrink: 0;">
            <button type="button" class="btn btn-secondary" onclick="ModalManager.close('editHabitModal')" style="border-radius: 12px; padding: 10px 24px; font-weight: 600;">{{ _('dashboard.cancel') }}</button>
            <button type="button" class="btn btn-primary" onclick="saveHabitEdit()" style="border-radius: 12px; padding: 10px 28px; font-weight: 700;">{{ _('dashboard.save_changes') }}</button>
        </div>
    </div>
</div>

<!-- Task Edit Modal — Horizontal Layout -->
