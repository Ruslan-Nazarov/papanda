<!-- Edit Event Modal -->
<div id="editEventModal" class="modal premium-modal">
    <style>
        .premium-modal .modal-content {
            border-radius: 24px;
            border: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            padding: 0;
            overflow: hidden;
            background: #fff;
        }
        .premium-modal .modal-header {
            padding: 24px 32px;
            background: var(--color-bg-subtle);
            border-bottom: 1px solid var(--color-bg-app);
        }
        .premium-modal .modal-header h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--color-text-dark);
            letter-spacing: -0.02em;
        }
        .premium-modal .modal-body {
            padding: 32px;
        }
        .premium-modal .form-label {
            font-size: 0.7rem;
            font-weight: 850;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
            margin-bottom: 8px;
            display: block;
        }
        .premium-modal .form-input, .premium-modal .form-select {
            border-radius: 12px;
            border: 1.5px solid var(--color-bg-app);
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: var(--color-bg-subtle);
            width: 100%;
        }
        .premium-modal .form-input:focus {
            border-color: var(--color-primary);
            background: #fff;
            box-shadow: 0 0 0 4px var(--color-primary-soft);
        }
        .premium-modal .info-box {
            background: var(--color-primary-soft);
            border: 1px solid var(--color-primary-glow);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        .premium-modal .weekday-pill {
            display: flex;
            gap: 6px;
            justify-content: space-between;
            background: var(--color-bg-subtle);
            padding: 8px;
            border-radius: 12px;
        }
        .premium-modal .day-checkbox {
            display: none;
        }
        .premium-modal .day-label {
            flex: 1;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            color: var(--color-text-muted);
        }
        .premium-modal .day-checkbox:checked + .day-label {
            background: var(--color-primary);
            color: #fff;
            box-shadow: 0 4px 10px var(--color-primary-soft);
        }
        .premium-modal .modal-footer {
            padding: 20px 32px;
            background: var(--color-bg-subtle);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-top: 1px solid var(--color-bg-app);
        }
        .premium-modal .btn-save {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: #fff;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            box-shadow: 0 4px 15px var(--color-primary-soft);
            transition: transform 0.2s;
        }
        .premium-modal .btn-save:hover {
            transform: translateY(-2px);
        }
    </style>

    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <h2>Edit Event</h2>
        </div>
        
        <div class="modal-body">
            <input type="hidden" id="editEventId" />
            <input type="hidden" id="editEventRecId" />
            <input type="hidden" id="editEventOriginalDate" />
            
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 24px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label class="form-label">Title</label>
                    <input type="text" id="editEventTitle" class="form-input" placeholder="What needs to be done?" style="font-size: 1.1rem; font-weight: 600;" />
                </div>
                <div class="form-group" style="margin-bottom: 0; padding-top: 20px;">
                    <label class="form-check-item" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 700; font-size: 0.85rem; color: var(--color-primary-dark); text-transform: uppercase;">
                        <input type="checkbox" id="editEventImportant" style="accent-color: var(--color-primary); width: 20px; height: 20px;"> 
                        <span>Important ⭐</span>
                    </label>
                </div>
            </div>

            <div id="editEventRecurrenceModeRow" class="info-box" style="display: none;">
                <label class="form-label" style="color: var(--color-primary-dark); margin-bottom: 12px;">Apply changes to:</label>
                <div style="display: flex; gap: 16px;">
                    {% for val, label in [('only', 'Only this'), ('this_and_future', 'Future'), ('all', 'All series')] %}
                    <label class="form-check-item" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;">
                        <input type="radio" name="edit_event_mode" value="{{ val }}" {{ 'checked' if val == 'only' else '' }} style="accent-color: var(--color-primary); width: 18px; height: 18px;"> 
                        <span>{{ label }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
                <div class="form-group">
                    <label class="form-label">Date & Time</label>
                    <input type="datetime-local" id="editEventDate" class="form-input" oninput="calcEditEventEndDateFromCount()" />
                </div>
                <div class="form-group">
                    <label class="form-label">Repeat Rule</label>
                    <select id="editEventRecRule" class="form-select" onchange="toggleEditEventWeekdays()">
                        <option value="none">Once</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="weekdays">Weekdays (M-F)</option>
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly</option>
                    </select>
                </div>
            </div>

            <div id="editEventWeekdaysRow" class="form-group" style="display: none; margin-bottom: 24px;">
                <label class="form-label">Select Days</label>
                <div class="weekday-pill">
                    {% for day in ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'] %}
                    <input type="checkbox" id="day-{{ day }}" class="day-checkbox" value="{{ day }}">
                    <label for="day-{{ day }}" class="day-label">{{ day[:1]|upper }}</label>
                    {% endfor %}
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; align-items: end;">
                <div class="form-group">
                    <label class="form-label">End Mode</label>
                    <div style="display: flex; gap: 16px; background: var(--color-bg-subtle); padding: 10px 16px; border-radius: 12px; border: 1.5px solid var(--color-bg-app);">
                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600;">
                            <input type="radio" name="edit_event_end_mode" value="date" id="editEventEndDateMode" checked onchange="toggleEditEventEndMode()" style="accent-color: var(--color-primary);"> <span>Date</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600;">
                            <input type="radio" name="edit_event_end_mode" value="count" id="editEventEndCountMode" onchange="toggleEditEventEndMode()" style="accent-color: var(--color-primary);"> <span>Count</span>
                        </label>
                    </div>
                </div>
                
                <div id="editEventEndDateBlock" class="form-group">
                    <label class="form-label">Repeat until</label>
                    <input type="date" id="editEventRecEnd" class="form-input" />
                </div>

                <div id="editEventEndCountBlock" class="form-group" style="display: none;">
                    <label class="form-label">Occurrences</label>
                    <input type="number" id="editEventRecCount" class="form-input" min="1" max="365" value="10" oninput="calcEditEventEndDateFromCount()" />
                </div>
            </div>

            <div id="editEventError" class="form-error-text" style="color: var(--color-error); font-size: 0.85rem; font-weight: 600;"></div>
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeEditEventModal()" style="border-radius: 12px; padding: 12px 24px; font-weight: 600;">Cancel</button>
            <button type="button" class="btn-save" onclick="saveEventEdit()">Save Changes</button>
        </div>
    </div>
</div>
