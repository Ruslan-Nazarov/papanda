<div class="premium-card settings-algo-widget">
    <div class="widget-header">
        <div class="widget-title">
            <span class="widget-icon">💡</span>
            <span>{{ _('settings.ui_tips.title') }}</span>
        </div>
        <div class="widget-actions">
            <button type="button" class="btn btn-secondary btn-icon widget-collapse-btn" onclick="toggleWidget(this, 'settings')">▼</button>
        </div>
    </div>
    <div class="widget-body">
        <div class="settings-grid" style="gap: 32px; grid-template-columns: 1fr;">
            <div class="settings-algo-form">
                <form action="{{ url_for('update_ui_tips') }}" method="post">
                    
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--color-border-light);">
                        <label class="form-label" style="margin: 0;">{{ _('settings.ui_tips.widgets') }}</label>
                        <label class="switch">
                            <input type="checkbox" name="show_widget_tips" value="true" {% if show_widget_tips %}checked{% endif %}>
                            <span class="slider round"></span>
                        </label>
                    </div>

                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--color-border-light);">
                        <label class="form-label" style="margin: 0;">{{ _('settings.ui_tips.lang_stats') }}</label>
                        <label class="switch">
                            <input type="checkbox" name="show_lang_tips" value="true" {% if show_lang_tips %}checked{% endif %}>
                            <span class="slider round"></span>
                        </label>
                    </div>

                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                        <label class="form-label" style="margin: 0;">{{ _('settings.ui_tips.dedications') }}</label>
                        <label class="switch">
                            <input type="checkbox" name="show_dedications" value="true" {% if show_dedications %}checked{% endif %}>
                            <span class="slider round"></span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; font-family: inherit;">{{ _('settings.save') }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
