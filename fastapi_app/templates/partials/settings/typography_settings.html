<div class="premium-card settings-typography-widget">
    <div class="widget-header">
        <div class="widget-title">
            <span class="widget-icon">📝</span>
            <span>Typography Theme</span>
        </div>
        <div class="widget-actions">
            <button type="button" class="btn btn-secondary btn-icon widget-collapse-btn" onclick="toggleWidget(this, 'settings')">▼</button>
        </div>
    </div>
    <div class="widget-body">
        <p style="font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 20px;">
            Customize the fonts used across the application.
        </p>
        <form action="{{ url_for('update_settings') }}" method="post" id="typographySettingsForm">
            <div class="settings-grid" style="gap: 16px;">
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label" for="theme_reading">Reading Font</label>
                    <select name="theme_reading" id="theme_reading" class="form-input">
                        <option value="sans" {% if theme_reading == 'sans' %}selected{% endif %}>Sans-Serif (Modern)</option>
                        <option value="serif" {% if theme_reading == 'serif' %}selected{% endif %}>Serif (Classic)</option>
                    </select>
                </div>
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label" for="theme_editor">Editor Font</label>
                    <select name="theme_editor" id="theme_editor" class="form-input">
                        <option value="mono" {% if theme_editor == 'mono' %}selected{% endif %}>Monospace (Code-like)</option>
                        <option value="sans" {% if theme_editor == 'sans' %}selected{% endif %}>Sans-Serif (Clean)</option>
                    </select>
                </div>

                <div class="form-group" style="grid-column: 1 / -1; margin-top: 10px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Apply Typography</button>
                </div>
            </div>
        </form>
    </div>
</div>
