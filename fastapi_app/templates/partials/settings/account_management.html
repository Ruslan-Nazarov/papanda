<div class="premium-card settings-account-widget">
    <div class="widget-header">
        <div class="widget-title">
            <span class="widget-icon">👤</span>
            <span>{{ _('settings.account.title') }}</span>
        </div>
        <div class="widget-actions">
            <button type="button" class="btn btn-secondary btn-icon widget-collapse-btn" onclick="toggleWidget(this, 'settings')">▼</button>
        </div>
    </div>
    
    <div class="widget-body">
        <div class="settings-grid">
            <div class="settings-algo-form">
                <form action="{{ url_for('update_account') }}" method="post" onsubmit="confirmFormSubmit(event, '{{ _('settings.account.update_account_confirm_title') }}', '{{ _('settings.account.update_account_confirm_msg') }}')">
                    <label class="form-label">{{ _('settings.account.username') }}</label>
                    <input type="text" name="username" value="{{ current_user_name }}" required class="form-input" />
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">{{ _('settings.account.update_username') }}</button>
                </form>
            </div>
            <div class="settings-algo-form">
                <form action="{{ url_for('update_account') }}" method="post">
                    <label class="form-label">{{ _('settings.account.new_password') }}</label>
                    <input type="password" name="password" placeholder="{{ _('settings.account.password_placeholder') }}" class="form-input" />
                    <p style="font-size: 0.75rem; color: var(--color-text-faint); margin-top: 10px; font-weight: 600;">{{ _('settings.account.password_hint') }}</p>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">{{ _('settings.account.update_password') }}</button>
                </form>
            </div>
        </div>
        <div style="margin-top: 32px; text-align: center; border-top: 1px solid var(--color-border-light); padding-top: 24px;">
            <form action="{{ url_for('logout') }}" method="post" id="logout-form">
                <button type="submit" class="btn btn-secondary" style="color: var(--color-error); font-weight: 800; border-color: var(--color-error-soft);">
                    Logout from Session
                </button>
            </form>
        </div>
    </div>
</div>
