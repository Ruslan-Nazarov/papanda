<div id="parentStickersOverviewModal" class="modal premium-modal" style="z-index: 1000004 !important;">
    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <div style="display: flex; flex-direction: column;">
                <h3 id="parentStickersOverviewTitle" style="margin: 0; font-size: 1.25rem;">{{ _('modal.associated_stickers') }}</h3>
                <span id="parentStickersOverviewSubtitle" style="font-size: 0.7em; font-weight: normal; color: var(--color-text-muted);">{{ _('modal.manage_thoughts') }}</span>
            </div>
            <button class="modal-close" onclick="closeParentStickersOverview()">✕</button>
        </div>
        <div class="modal-body" style="padding: 24px !important;">
            <div id="parentStickersList" class="parent-stickers-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px;">
                <!-- Stickers will be injected here -->
            </div>
            
            <div id="noParentStickersMessage" style="display: none; text-align: center; padding: 40px; color: var(--color-text-muted);">
                <div style="font-size: 3em; margin-bottom: 10px; opacity: 0.3;">📋</div>
                <p>{{ _('modal.no_stickers_found') }}</p>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeParentStickersOverview()">{{ _('modal.close') }}</button>
            <button type="button" class="btn btn-primary" onclick="createNewStickerForCurrentParent()">
                <span style="font-size: 1.2em;">+</span> {{ _('modal.add_new_sticker') }}
            </button>
        </div>
    </div>
</div>
