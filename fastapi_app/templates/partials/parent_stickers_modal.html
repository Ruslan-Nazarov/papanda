<div id="parentStickersOverviewModal" class="modal" style="z-index: 1000004 !important;">
    <div class="modal-content" style="max-width: 600px; background: #fffaf0;">
        <div class="modal-header" style="background: #fff5e6; border-bottom: 1px solid #ffd8a8;">
            <div style="display: flex; flex-direction: column;">
                <span id="parentStickersOverviewTitle">Associated Stickers</span>
                <span id="parentStickersOverviewSubtitle" style="font-size: 0.7em; font-weight: normal; color: #888;">Manage thoughts for this item</span>
            </div>
            <span class="modal-close" onclick="closeParentStickersOverview()">&times;</span>
        </div>
        <div class="modal-body" style="padding: 20px;">
            <div id="parentStickersList" class="parent-stickers-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px;">
                <!-- Stickers will be injected here -->
            </div>
            
            <div id="noParentStickersMessage" style="display: none; text-align: center; padding: 40px; color: #999;">
                <div style="font-size: 3em; margin-bottom: 10px; opacity: 0.3;">📋</div>
                <p>No stickers found for this item.</p>
            </div>
        </div>
        <div class="modal-footer" style="background: #fffcf8; border-top: 1px solid #ffd8a8;">
            <button type="button" class="btn-premium" onclick="createNewStickerForCurrentParent()" style="background: #f2994a; color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 1.2em;">+</span> Add New Sticker
            </button>
            <button type="button" class="btn-premium btn-cancel-premium" onclick="closeParentStickersOverview()">Close</button>
        </div>
    </div>
</div>
