<div class="premium-card words-widget">
    <div class="widget-header" style="margin-bottom: 8px;">
        <div class="widget-title">
            <span class="widget-icon">📖</span>
            <span><a href="/languages" style="color: inherit; text-decoration: none;">{{ _('dashboard.words') }}</a></span>
            {% if show_widget_tips %}
            <span class="help-trigger" onclick="openWidgetHelpModal('{{ _('dashboard.words') }}')">?</span>
            {% endif %}
        </div>
        <div class="widget-actions">
            <button type="button" class="btn btn-secondary btn-icon widget-settings-trigger" onclick="WidgetSettings.openColorPicker(this)" title="{{ _('dashboard.widget_color') }}">🎨</button>
            <a href="/languages" class="btn btn-secondary btn-icon" style="text-decoration: none; display: flex; align-items: center; justify-content: center;" title="Перейти в языковую панель">↗</a>
            <button type="button" class="btn btn-secondary btn-icon" onclick="toggleWidget(this)">▼</button>
        </div>
    </div>

    <div class="widget-body" style="padding-top: 0; text-align: center; display: flex; flex-direction: column; justify-content: center; height: calc(100% - 40px);">
        <!-- Compact Stats Row -->
        <div style="display: flex; gap: 12px; margin-bottom: 12px; padding: 0 4px; font-size: 0.9rem; color: var(--color-text-faint); text-transform: uppercase; font-weight: 800; justify-content: center;">
            <div title="Volume / Объем">V: <b id="volume-count" style="color: var(--color-primary);">{{ count_words_translate }}</b></div>
            <div title="Coverage / Покрытие">C: <b id="coverage-count" style="color: var(--color-success);">{{ coverage_learning_words }}%</b></div>
            <div title="iMW / Важные слова">I: <b id="imw-count" style="color: var(--color-warning);">{{ iMW }}%</b></div>
        </div>
        
        <p style="font-size: 0.8rem; color: var(--color-text-muted); margin-bottom: 15px;">Полная статистика, словарь и тесты перенесены в отдельную языковую панель.</p>
        
        <a href="/languages" class="btn btn-primary" style="text-decoration: none; display: inline-block; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem;">Открыть языковую панель</a>
    </div>
</div>
