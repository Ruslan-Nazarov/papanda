<div class="premium-card habits-widget">
    <div class="widget-header">
        <div class="widget-title">
            <span class="widget-icon">⚡</span>
            <span>Habits</span>
        </div>
        <div class="widget-actions">
            <button type="button" class="btn btn-secondary btn-icon widget-settings-trigger" onclick="WidgetSettings.openColorPicker(this)" title="Widget Color">🎨</button>
            <button type="button" class="btn btn-secondary btn-icon" onclick="openDbViewModal('Habit')" title="Full View">☰</button>
            <button type="button" class="btn btn-secondary btn-icon" onclick="toggleWidget(this)">▼</button>
        </div>
    </div>

    <div class="widget-body">
        <ul class="premium-list">
            {% for habits in habits_all %}
            <li class="premium-list-item">
                <div style="display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;">
                    <span class="premium-item-name">{{ habits.title }}</span>
                    <div class="premium-badge muted">
                        {{ habits_count(habits.start_date) }} Days
                    </div>
                </div>

                <div class="row-actions">
                    <button type="button" class="btn-row-action" onclick="openParentStickers('habit', '{{ habits.id }}')" title="Stickers">
                        <div class="sticker-icon-mini {{ 'inactive' if not habits.stickers_count }}">
                            {% if habits.stickers_count > 0 %}
                            <span class="sticker-count">{{ habits.stickers_count }}</span>
                            {% endif %}
                        </div>
                    </button>
                    <form method="post" action="/mark_as_done/{{ habits.id }}" style="margin: 0;" onsubmit="event.preventDefault(); markHabitDone(this, '{{ habits.id }}')">
                        <button type="submit" class="btn-row-action done" title="Mark as done">✓</button>
                    </form>
                </div>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
