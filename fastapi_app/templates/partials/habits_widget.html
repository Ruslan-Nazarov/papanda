                    <div class="section reading-section">
                        <div class="widget-header">
                            <h1 class="widget-title">
                                <span class="drag-handle">⠿</span>Habits Counter
                            </h1>
                            <button
                                type="button"
                                class="collapse-btn collapse-btn-toggle"
                                onclick="toggleWidget(this)"
                                title="Свернуть / развернуть"
                            >
                                ▾
                            </button>
                        </div>
                        <div class="widget-body">
                            <table class="table-common reading-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Days</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for habits in habits_all %}
                                    <tr>
                                        <td>
                                            <div style="display: flex; align-items: center; justify-content: space-between;">
                                                <span>{{ habits.title }}</span>
                                                <div class="habit-actions" style="display: flex; gap: 8px; align-items: center;">
                                                    <button type="button" class="habit-sticker-btn" 
                                                        onclick="openParentStickers('habit', '{{ habits.id }}')" 
                                                        title="Stickers"
                                                        style="background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;"
                                                    >
                                                        <div class="sticker-icon-small" style="opacity: {{ 1 if habits.stickers_count else 0.3 }};"></div>
                                                    </button>
                                                    <form
                                                        method="post"
                                                        action="/mark_as_done/{{ habits.id }}"
                                                        style="margin: 0;"
                                                    >
                                                        <input
                                                            type="submit"
                                                            value="Done"
                                                            class="read-button"
                                                            style="padding: 2px 8px; font-size: 0.85em;"
                                                        />
                                                    </form>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="text-right">
                                            {{ habits_count(habits.start_date) }}
                                        </td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>
