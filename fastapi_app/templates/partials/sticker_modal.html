<div class="modal" id="stickerDetailModal" style="display: none; z-index: 1000005 !important;">
    <div class="modal-content premium-card" style="width: 480px; max-width: 95vw; height: auto; min-height: unset; padding: 0; overflow: hidden; border-radius: 28px;">
        <!-- Header -->
        <div class="modal-header" style="padding: 20px 24px; background: var(--color-bg-subtle); border-bottom: 1px solid var(--color-border-light);">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="sticker-icon-mini"></div>
                <h3 id="modalStickerActionTitle" style="margin: 0; font-size: 1.2rem; font-weight: 850; color: var(--color-text-dark);">Sticker Detail</h3>
            </div>
        </div>

        <div class="modal-body" style="padding: 24px; max-height: 80vh; overflow-y: auto;">
            
            <!-- VIEW MODE (Viewer) -->
            <div id="stickerModalViewer" style="display: none; padding: 40px 0;">
                <div id="stickerPreviewContent" style="display: flex; justify-content: center; align-items: center; min-height: 300px; background: rgba(0,0,0,0.02); border-radius: 24px; margin-bottom: 10px;">
                    <!-- Rendered Sticker Here -->
                </div>
            </div>

            <!-- EDIT MODE (Editor) -->
            <div id="stickerModalEditor">
                <!-- Preview Card (Live) -->
                <div style="display: flex; justify-content: center; align-items: center; padding: 20px 0; background: rgba(0,0,0,0.01); border-radius: 20px; margin-bottom: 24px;">
                    <div id="stickerPreviewContentEdit">
                        <!-- Smaller preview for editing -->
                    </div>
                </div>

                <!-- Title Input -->
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="highlight-label">Title</label>
                    <input type="text" id="stickerDetailTitle" class="form-input" placeholder="Give it a name..." oninput="updateStickerPreview()">
                </div>

                <!-- Type Selector -->
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="highlight-label">Content Mode</label>
                    <div class="sticker-type-segmented">
                        <div id="type-text" class="type-segment active" onclick="setStickerDetailType('text')">📝 Text</div>
                        <div id="type-list" class="type-segment" onclick="setStickerDetailType('list')">✅ List</div>
                    </div>
                </div>

                <!-- Text Content -->
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="highlight-label">Content</label>
                    <textarea id="stickerDetailText" class="form-input" placeholder="Your thoughts here..." oninput="updateStickerPreview()" style="min-height: 160px; max-height: 300px; line-height: 1.5; font-family: inherit;"></textarea>
                </div>

                <!-- Note Attachment (if any) -->
                <div id="stickerNoteSection" style="display: none; margin-bottom: 20px;">
                    <label class="highlight-label">Linked Note</label>
                    <div id="attachedNoteContent" style="display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--color-bg-app); border-radius: 12px; border: 1px solid var(--color-border-light);">
                        <!-- Note info -->
                    </div>
                </div>

                <!-- Color Palette -->
                <div class="form-group">
                    <label class="highlight-label">Color Theme</label>
                    <div class="color-picker-grid">
                        {% for color in ['#fff9c4', '#f8bbd0', '#bbdefb', '#c8e6c9', '#e1bee7', '#ffe0b2', '#b2dfdb', '#ffffff'] %}
                        <div class="color-swatch {% if loop.first %}active{% endif %}" data-color="{{ color }}" style="background: {{ color }};" onclick="setStickerDetailColor('{{ color }}', this)"></div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="modal-footer" style="padding: 20px 24px; background: var(--color-bg-subtle); border-top: 1px solid var(--color-border-light); display: flex; justify-content: flex-end; gap: 12px;">
            <button id="stickerArchiveBtn" class="btn" style="background: transparent; color: var(--color-error); font-weight: 700;" onclick="deleteStickerFromModal()">Archive</button>
            <div style="flex: 1;"></div>
            <button id="stickerEditBtn" class="btn btn-secondary" style="display: none; min-width: 100px;" onclick="setStickerModalMode('edit')">Edit</button>
            <button class="btn btn-secondary" style="min-width: 100px;" onclick="closeStickerModal()">Cancel</button>
            <button id="stickerSaveBtn" class="btn btn-primary" style="min-width: 120px;" onclick="saveStickerDetail()">Save</button>
        </div>
    </div>
</div>
