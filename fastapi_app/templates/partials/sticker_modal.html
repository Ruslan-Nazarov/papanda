<div class="modal premium-modal" id="stickerDetailModal" style="display: none; z-index: 1000005 !important;">
    <div class="modal-content premium-card" style="width: 480px; max-width: 95vw; height: auto; min-height: unset; padding: 0; overflow: hidden; border-radius: 28px;">
        <!-- Header -->
        <div class="modal-header" style="padding: 20px 24px; background: var(--color-bg-subtle); border-bottom: 1px solid var(--color-border-light);">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="sticker-icon-mini"></div>
                <h3 id="modalStickerActionTitle" style="margin: 0; font-size: 1.2rem; font-weight: 850; color: var(--color-text-dark);">{{ _('modal.sticker_detail') }}</h3>
            </div>
        </div>

        <div class="modal-body" style="padding: 24px; max-height: 80vh; overflow-y: auto;">
            
            <!-- VIEW MODE (Viewer) -->
            <div id="stickerModalViewer" style="display: none; padding: 40px 0;">
                <div id="stickerPreviewContent" style="display: flex; justify-content: center; align-items: center; min-height: 300px; background: rgba(0,0,0,0.02); border-radius: 24px; margin-bottom: 10px;">
                    <!-- Rendered Sticker Here -->
                </div>
            </div>

            <!-- EDIT MODE (Editor) -->
            <div id="stickerModalEditor">
                <!-- Preview Card (Live) -->
                <div style="display: flex; justify-content: center; align-items: center; padding: 20px 0; background: rgba(0,0,0,0.01); border-radius: 20px; margin-bottom: 24px;">
                    <div id="stickerPreviewContentEdit">
                        <!-- Smaller preview for editing -->
                    </div>
                </div>

                <!-- Title Input -->
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="highlight-label">{{ _('dashboard.title') }}</label>
                    <input type="text" id="stickerDetailTitle" class="form-input" placeholder="{{ _('modal.give_it_a_name') }}" oninput="updateStickerPreview()">
                </div>

                <!-- Type Selector -->
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="highlight-label">{{ _('modal.content_mode') }}</label>
                    <div class="sticker-type-segmented">
                        <div id="type-text" class="type-segment active" onclick="setStickerDetailType('text')">📝 {{ _('modal.mode_text') }}</div>
                        <div id="type-list" class="type-segment" onclick="setStickerDetailType('list')">✅ {{ _('modal.mode_list') }}</div>
                    </div>
                </div>

                <!-- Text Content -->
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="highlight-label">{{ _('modal.content') }}</label>
                    <textarea id="stickerDetailText" class="form-input" placeholder="{{ _('modal.your_thoughts_here') }}" oninput="updateStickerPreview()" style="min-height: 160px; max-height: 300px; line-height: 1.5; font-family: inherit;"></textarea>
                </div>

                <!-- Note Attachment (if any) -->
                <div id="stickerNoteSection" style="display: none; margin-bottom: 20px;">
                    <label class="highlight-label">{{ _('modal.linked_note') }}</label>
                    <div id="attachedNoteContent" style="display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--color-bg-app); border-radius: 12px; border: 1px solid var(--color-border-light);">
                        <!-- Note info -->
                    </div>
                </div>

                <!-- Attach Note Button -->
                <div class="form-group" id="stickerAttachNoteBtnGroup" style="margin-bottom: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="openNoteSelectionModal()" style="width: 100%; border-radius: 14px; padding: 10px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        🔗 {{ _('modal.attach_note_lesson') }}
                    </button>
                </div>

                <!-- Color Palette -->
                <div class="form-group">
                    <label class="highlight-label">{{ _('modal.color_theme') }}</label>
                    <div class="color-picker-grid">
                        {% for color in ['#fff9c4', '#f8bbd0', '#bbdefb', '#c8e6c9', '#e1bee7', '#ffe0b2', '#b2dfdb', '#ffffff'] %}
                        <div class="color-swatch {% if loop.first %}active{% endif %}" data-color="{{ color }}" style="background: {{ color }};" onclick="setStickerDetailColor('{{ color }}', this)"></div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="modal-footer" style="padding: 20px 24px; background: var(--color-bg-subtle); border-top: 1px solid var(--color-border-light); display: flex; justify-content: flex-end; gap: 12px;">
            <button id="stickerArchiveBtn" class="btn" style="background: transparent; color: var(--color-error); font-weight: 700;" onclick="deleteStickerFromModal()">{{ _('modal.archive') }}</button>
            <div style="flex: 1;"></div>
            <button id="stickerEditBtn" class="btn btn-secondary" style="display: none; min-width: 100px;" onclick="setStickerModalMode('edit')">{{ _('modal.edit') }}</button>
            <button class="btn btn-secondary" style="min-width: 100px;" onclick="closeStickerModal()">{{ _('dashboard.cancel') }}</button>
            <button id="stickerSaveBtn" class="btn btn-primary" style="min-width: 120px;" onclick="saveStickerDetail()">{{ _('modal.save') }}</button>
        </div>
    </div>
</div>

<!-- Note Selection Modal -->
<div id="noteSelectionModal" class="modal premium-modal" style="display: none; z-index: 1000006 !important; align-items: center; justify-content: center;">
    <div class="modal-content premium-card" style="width: 500px; max-width: 95vw; border-radius: 24px; padding: 0; overflow: hidden; background: var(--color-bg-card); border: 1px solid var(--color-border-light);">
        <div class="modal-header" style="padding: 20px 24px; background: var(--color-bg-subtle); border-bottom: 1px solid var(--color-border-light); display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; font-size: 1.2rem; font-weight: 850; color: var(--color-text-dark);">🔗 {{ _('modal.select_note_lesson') }}</h3>
            <button type="button" class="btn-close" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: var(--color-text-muted);" onclick="closeNoteSelectionModal()">&times;</button>
        </div>
        <div class="modal-body" style="padding: 24px;">
            <div class="form-group" style="margin-bottom: 20px;">
                <input type="text" id="noteSearchInput" class="form-input" placeholder="{{ _('modal.search_notes') }}" oninput="searchNotesForSticker(this.value)">
            </div>
            <div id="noteSearchResults" style="max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
        <div class="modal-footer" style="padding: 16px 24px; background: var(--color-bg-subtle); border-top: 1px solid var(--color-border-light);">
            <button type="button" class="btn btn-secondary" onclick="closeNoteSelectionModal()" style="width: 100%;">{{ _('dashboard.cancel') }}</button>
        </div>
    </div>
</div>

<style>
.note-search-item {
    padding: 12px 16px;
    border-radius: 12px;
    background: var(--color-bg-app);
    border: 1px solid var(--color-border-light);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-align: left;
}
.note-search-item:hover {
    background: var(--color-bg-subtle);
    border-color: var(--color-primary);
    transform: translateY(-1px);
}
.note-search-item .note-category {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--color-primary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.note-search-item .note-text {
    font-size: 0.85rem;
    color: var(--color-text-body);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
}
</style>
