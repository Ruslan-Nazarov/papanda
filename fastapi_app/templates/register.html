<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Papanda Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF8C00;
            --accent: #F2994A;
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #e0e0e0;
            --muted: #888;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.15;
        }
        .blob1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
        .blob2 { width: 300px; height: 300px; background: cyan; bottom: -50px; right: -50px; }

        .login-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary), #FFB74D);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 { font-weight: 600; margin-bottom: 20px; font-size: 1.1em; color: var(--muted); }

        .form-group { margin-bottom: 15px; text-align: left; }
        
        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(242, 153, 74, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.4);
        }

        .error { color: #ff5252; margin-bottom: 15px; font-size: 0.9em; height: 1em; }
        
        .footer-link {
            margin-top: 20px;
            font-size: 0.9em;
            color: var(--muted);
        }
        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bg-blob blob1"></div>
    <div class="bg-blob blob2"></div>

    <div class="login-card">
        <div class="logo">Papanda</div>
        <h2>Создать аккаунт</h2>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% else %}
        <div class="error"></div>
        {% endif %}

        <form action="/register" method="post">
            <div class="form-group">
                <input type="text" name="username" placeholder="Логин (например, admin)" required autofocus>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Пароль" required>
            </div>
            <div class="form-group">
                <input type="password" name="confirm_password" placeholder="Повторите пароль" required>
            </div>
            
            <div style="font-size: 0.8em; color: var(--muted); text-align: left; margin-bottom: 15px; border-left: 2px solid var(--primary); padding-left: 10px;">
                • Логин: 3-20 симв. (буквы, цифры, _)<br>
                • Пароль: минимум 8 символов<br>
                • Пароли должны совпадать
            </div>

            <button type="submit">Зарегистрироваться</button>
        </form>

        <div class="footer-link">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </div>
</body>
</html>
